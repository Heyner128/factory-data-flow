spring:
  docker:
    compose:
      file:
        - ../compose.yaml
        - ../compose-dev.yaml
      host: ${DOCKER_HOST:-localhost}
      lifecycle-management: start_only
  config:
   import: optional:file:../.env[.properties]
  jpa:
   show-sql: true
   properties:
     hibernate:
       format_sql: true
  devtools:
   restart:
     enabled: true
  liquibase:
    contexts: demo