repos:
  - repo: local
    hooks:
      - id: ktlint
        name: ktlint
        entry: ./gradlew ktlintCheck
        language: system
        pass_filenames: false
      - id: detekt
        name: detekt
        entry: ./gradlew detekt
        language: system
        pass_filenames: false
      - id: jacocoCoverageVerification
        name:  jacoco test coverage verification
        entry: ./gradlew jacocoCoverageVerification
        language: system
        pass_filenames: false
        